<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamOps</title>

    <style>

        body{
            margin:0;
            font-family:Arial, Helvetica, sans-serif;
            background:#f5f7fb;
        }

        header{

            background:#0057d8;
            color:white;
            padding:20px;

        }

        h1{

            margin:0;

        }

        .card{

            background:white;
            margin:25px;
            padding:25px;
            border-radius:15px;
            box-shadow:0 5px 15px rgba(0,0,0,.1);

        }

        button{

            background:#0057d8;
            color:white;
            border:none;
            padding:15px 25px;
            border-radius:10px;
            font-size:16px;
            cursor:pointer;

        }

    </style>

</head>

<body>

<header>

<h1>🚀 StreamOps 2.0</h1>

<p>The future of field service management.</p>

</header>

<div class="card">

<h2>Welcome Scott 👋</h2>

<p>This is the very first production version of StreamOps.</p>

<p>Today we'll begin building the UK's best engineering management platform.</p>

<button>Start Building</button>

</div>

</body>

</html>
