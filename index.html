<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StreamOps</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f8fafc;
      padding-bottom: 90px;
    }

    .header {
      padding: 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0b1f3a, #2563eb);
      color: white;
      display: grid;
      place-items: center;
      font-weight: bold;
      font-size: 22px;
    }

    h1 {
      font-size: 24px;
      margin: 0;
    }

    .small {
      color: #64748b;
      font-size: 14px;
    }

    .card {
      background: white;
      margin: 14px 18px;
      padding: 18px;
      border-radius: 22px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
      border: 1px solid #e2e8f0;
    }

    .hero {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
    }

    .hero .small {
      color: #dbeafe;
    }

    .job-title {
      font-size: 22px;
      font-weight: bold;
      margin: 8px 0;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: #2563eb;
      color: white;
    }

    .secondary {
      background: #eff6ff;
      color: #2563eb;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 14px 18px;
    }

    .quick {
      background: white;
      padding: 18px;
      border-radius: 20px;
      text-align: center;
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      font-weight: bold;
    }

    .icon {
      font-size: 26px;
      margin-bottom: 8px;
    }

    .job-card {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .badge {
      background: #dbeafe;
      color: #1d4ed8;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 14px;
      width: calc(100% - 28px);
      max-width: 402px;
      background: white;
      border: 1px solid #e2e8f0;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
      border-radius: 24px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      padding: 8px;
    }

    .nav-item {
      text-align: center;
      font-size: 11px;
      color: #64748b;
      font-weight: bold;
    }

    .nav-icon {
      font-size: 20px;
      margin-bottom: 3px;
    }

    .active {
      color: #2563eb;
    }

    .scan {
      background: #2563eb;
      color: white;
      border-radius: 18px;
      padding: 8px 0;
      margin-top: -18px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div>
        <h1>Good morning, Scott</h1>
        <div class="small">Engineer App</div>
      </div>
      <div class="logo">S</div>
    </div>

    <div class="card hero">
      <div class="small">Today's First Job</div>
      <div class="job-title">Tesco Reading</div>
      <div>Dock Leveller DL500</div>
      <div style="margin-top: 8px; font-weight: bold;">09:00</div>
      <button class="secondary">View Details ›</button>
    </div>

    <div style="margin: 0 18px;">
      <button class="primary">▶ Start Journey</button>
    </div>

    <div class="grid">
      <div class="quick">
        <div class="icon">📷</div>
        Scan Part
      </div>
      <div class="quick">
        <div class="icon">📖</div>
        Manuals
      </div>
      <div class="quick">
        <div class="icon">📦</div>
        Stock
      </div>
      <div class="quick">
        <div class="icon">📞</div>
        Support
      </div>
    </div>

    <div class="card">
      <h2>Next Jobs</h2>

      <div class="job-card">
        <div>
          <strong>Sainsbury's Basingstoke</strong>
          <div class="small">10:30 · Sectional Door</div>
        </div>
        <div class="badge">Scheduled</div>
      </div>

      <hr style="border: none; border-top: 1px solid #e2e8f0; margin: 16px 0;">

      <div class="job-card">
        <div>
          <strong>DHL Depot</strong>
          <div class="small">14:00 · Dock Leveller</div>
        </div>
        <div class="badge">Scheduled</div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active">
        <div class="nav-icon">🏠</div>
        Home
      </div>
      <div class="nav-item">
        <div class="nav-icon">📅</div>
        Jobs
      </div>
      <div class="nav-item scan">
        <div class="nav-icon">📷</div>
        Scan
      </div>
      <div class="nav-item">
        <div class="nav-icon">📦</div>
        Stock
      </div>
      <div class="nav-item">
        <div class="nav-icon">👤</div>
        Profile
      </div>
    </div>
  </div>
</body>
</html>
